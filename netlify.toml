[build]
  publish = "website"

[[redirects]]
  from = "/referral/:code"
  to = "/register.html?ref=:code"
  status = 302

[[redirects]]
  from = "/ref/:code"
  to = "/register.html?ref=:code"
  status = 302

[[redirects]]
  from = "/r/:code"
  to = "/register.html?ref=:code"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
