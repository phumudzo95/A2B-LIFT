[build]
  publish = "website"

[[redirects]]
  from = "/referral/*"
  to = "https://api.a2blift.com/referral/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ref/*"
  to = "https://api.a2blift.com/ref/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/r/*"
  to = "https://api.a2blift.com/r/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
