[build]
  publish = "website"

[[redirects]]
  from = "/referral/:code"
  to = "/referral-launch.html"
  status = 200

[[redirects]]
  from = "/ref/:code"
  to = "/referral-launch.html"
  status = 200

[[redirects]]
  from = "/r/:code"
  to = "/referral-launch.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
