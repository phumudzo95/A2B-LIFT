<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — A2B Lift</title>
  <meta name="description" content="Log in or create your A2B Lift account." />
  <link rel="icon" href="../assets/images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <header class="nav" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo"><img src="../assets/images/icon.png" alt="A2B Lift" class="logo-img" /><span class="logo-text">A2B<strong>Lift</strong></span></a>
      <div style="flex:1;"></div>
      <div class="nav-actions">
        <a href="driver-register.html" class="btn btn-ghost btn-sm">Become a driver</a>
      </div>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html" class="logo">
          <img src="../assets/images/icon.png" alt="A2B Lift" class="logo-img" />
          <span class="logo-text">A2B<strong>Lift</strong></span>
        </a>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Log in</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Create account</button>
      </div>

      <!-- LOG IN PANEL -->
      <div class="auth-panel-login active" id="panelLogin">
        <div class="auth-form">
          <div class="social-auth">
            <button class="btn-social-auth" type="button" onclick="googleSignIn()">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              Continue with Google
            </button>
          </div>
          <div class="form-divider">or</div>
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="auth-form">
              <div class="form-group">
                <label for="loginEmail">Email address</label>
                <input type="email" id="loginEmail" name="email" placeholder="your@email.com" autocomplete="email" required />
              </div>
              <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" placeholder="Enter your password" autocomplete="current-password" required />
              </div>
              <a href="#" class="forgot-link">Forgot password?</a>
              <button type="submit" class="btn btn-primary form-submit">Log in</button>
            </div>
          </form>
        </div>
        <p class="auth-footer-text">Don't have an account? <a href="#" onclick="switchTab('register');return false;">Create one</a></p>
      </div>

      <!-- REGISTER PANEL -->
      <div class="auth-panel-register" id="panelRegister">
        <div class="auth-form">
          <div class="social-auth">
            <button class="btn-social-auth" type="button" onclick="googleSignIn()">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              Sign up with Google
            </button>
          </div>
          <div class="form-divider">or sign up with email</div>
          <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="auth-form">
              <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-group">
                  <label for="regFirst">First name</label>
                  <input type="text" id="regFirst" placeholder="First name" autocomplete="given-name" required />
                </div>
                <div class="form-group">
                  <label for="regLast">Last name</label>
                  <input type="text" id="regLast" placeholder="Last name" autocomplete="family-name" required />
                </div>
              </div>
              <div class="form-group">
                <label for="regEmail">Email address</label>
                <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email" required />
              </div>
              <div class="form-group">
                <label for="regPhone">Phone number</label>
                <input type="tel" id="regPhone" placeholder="+27 71 000 0000" autocomplete="tel" required />
              </div>
              <div class="form-group">
                <label for="regPassword">Create a password</label>
                <input type="password" id="regPassword" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8" />
              </div>
              <button type="submit" class="btn btn-primary form-submit">Create account</button>
              <p style="font-size:12px;color:var(--grey-400);text-align:center;line-height:1.6;">
                By creating an account you agree to our <a href="support.html#terms" style="color:var(--grey-600);">Terms of Service</a> and <a href="support.html#privacy" style="color:var(--grey-600);">Privacy Policy</a>.
              </p>
            </div>
          </form>
        </div>
        <p class="auth-footer-text">Already have an account? <a href="#" onclick="switchTab('login');return false;">Log in</a></p>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-panel-login, .auth-panel-register').forEach(p => p.classList.remove('active'));
      if (tab === 'login') {
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('panelLogin').classList.add('active');
      } else {
        document.getElementById('tabRegister').classList.add('active');
        document.getElementById('panelRegister').classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('[type=submit]');
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      btn.textContent = 'Logging in…';
      btn.disabled = true;
      try {
        const res = await fetch('https://api-production-0783.up.railway.app/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('a2b_token', data.token);
          if (data.user) localStorage.setItem('a2b_user', JSON.stringify(data.user));
          const next = new URLSearchParams(window.location.search).get('next') || 'dashboard.html';
          window.location.href = next;
        } else {
          alert(data.message || 'Login failed. Please check your credentials.');
          btn.textContent = 'Log in'; btn.disabled = false;
        }
      } catch {
        alert('Unable to reach the server. Please try again.');
        btn.textContent = 'Log in'; btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = e.target.querySelector('[type=submit]');
      const body = {
        firstName: document.getElementById('regFirst').value,
        lastName: document.getElementById('regLast').value,
        email: document.getElementById('regEmail').value,
        phone: document.getElementById('regPhone').value,
        password: document.getElementById('regPassword').value,
        role: 'client'
      };
      btn.textContent = 'Creating account…';
      btn.disabled = true;
      try {
        const res = await fetch('https://api-production-0783.up.railway.app/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('a2b_token', data.token);
          if (data.user) localStorage.setItem('a2b_user', JSON.stringify(data.user));
          const next = new URLSearchParams(window.location.search).get('next') || 'dashboard.html';
          window.location.href = next;
        } else {
          alert(data.message || 'Registration failed. Please try again.');
          btn.textContent = 'Create account'; btn.disabled = false;
        }
      } catch {
        alert('Unable to reach the server. Please try again.');
        btn.textContent = 'Create account'; btn.disabled = false;
      }
    }

    // Pre-select tab from URL hash
    if (window.location.hash === '#register') switchTab('register');

    // ── Keep user signed in: redirect if already logged in ──
    (function() {
      const tok = localStorage.getItem('a2b_token');
      const dest = new URLSearchParams(window.location.search).get('next') || 'dashboard.html';
      if (tok) window.location.replace(dest);
    })();

    function googleSignIn() {
      alert('Google Sign-In: configure your Google OAuth Client ID in login.html to enable this. Your Google API key is already connected for Maps.');
    }
  </script>
</body>
</html>
